<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="icon" href="/frontend/assets/images/Kiwi.png">
    <link rel="stylesheet" href="/frontend/auth/css/register.css">
</head>
<body>
    <header class="icon">
        <img src="/frontend/assets/images/Kiwi.png" alt="iconkiwi"
        width="90px"
        height="70px">
        <h1>KiwiFinance</h1>
    </header>

    <main>
        <div class="Titulo">
            <h1>Cadastro</h1>
        </div>
        
        <form action="register" method="post" class=" form-container">
            <div class="input-group">
                <label for="username">Nome</label>
                <input type="text" name="username" id="username" placeholder="Nome de usuário">
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="text" name="email" id="email" placeholder="Email">
            </div>

            <div class="input-group">
                <label for="CPF">CPF</label>
                <input type="text" name="CPF" id="CPF" placeholder="CPF">
            </div>

            <div class="input-group">
                <label for="numero">Número</label>
                <input type="text" name="numero" id="numero" placeholder="Número">
            </div>

            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" name="password" id="password" placeholder="Senha">
            </div>

            <div class="input-group">
                <label for="password">Confirme a senha</label>
                <input type="password" name="password" id="password" placeholder="Confirme sua senha">
            </div>

        </form>
        <div class="btn">
            <button type="submit">Criar conta</button>
            <p>Junte-se a nós</p>
        </div>

    </main>
</body>
</html>
