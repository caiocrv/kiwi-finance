<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="icon" href="../assets/images/Kiwi.png">
    <link rel="stylesheet" href="css/register.css">
</head>
<body data-auth-page="register">
    <header class="icon">
        <img src="../assets/images/Kiwi.png" alt="iconkiwi"
        width="90px"
        height="70px">
        <h1>KiwiFinance</h1>
    </header>

    <main>
        <div class="Titulo">
            <h1>Cadastro</h1>
        </div>
        
        <form action="register" method="post" class=" form-container" id="register-form" data-auth-form novalidate>
            <div class="input-group">
                <label for="nome">Nome</label>
                <input type="text" name="nome" id="nome" placeholder="Nome de usuario" autocomplete="name" required>
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" name="email" id="email" placeholder="Email" autocomplete="email" required>
            </div>

            <div class="input-group">
                <label for="cpf">CPF</label>
                <input type="text" name="cpf" id="cpf" placeholder="CPF">
            </div>

            <div class="input-group">
                <label for="telefone">Numero</label>
                <input type="text" name="telefone" id="telefone" placeholder="Numero" autocomplete="tel">
            </div>

            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" name="password" id="password" placeholder="Senha" autocomplete="new-password" required>
            </div>

            <div class="input-group">
                <label for="confirmPassword">Confirme a senha</label>
                <input type="password" name="confirmPassword" id="confirmPassword" placeholder="Confirme sua senha" autocomplete="new-password" required>
            </div>

        </form>
        <div class="btn">
            <button type="submit" form="register-form" data-auth-submit>Criar conta</button>
            <p>Junte-se a nos</p>
        </div>

    </main>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
