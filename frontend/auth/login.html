<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KiwiFinance</title>
    <link rel="icon" href="/frontend/assets/images/Kiwi.png">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <!--LOGO CANTO SUPERIOR ESQUERDO-->

    <header>
        <div class="Logo">
            <h3>KiwiFinance</h3>
        </div>
    </header>

    <!--AREA DE LOGIN-->
    <main>

        <div class="main-login">

            <div class="logo">
                <img src="/frontend/assets/images/Kiwi.png" alt="Logo-Kiwi">
             </div>


            <div class="left-login">
                <h1>CONTROLE SUAS FINANÇAS DE FORMA SIMPLES!</h1>
            </div>

            <div class="right-login">
                <div class="card-login">
                    <h1>Login</h1>

                    <form action="login" method="post">
                        <label for="username">Usuário:</label>
                        <input type="text" id="username" name="username" placeholder="Nome de usário">

                        <br><br>

                        <label for="password">Senha:</label>
                        <input type="password" name="password" id="password" placeholder="Senha">

                        <br><br>

                        <button type="submit">Acessar Conta</button>

                        <br><br>

                        <p>Ainda não tem uma conta?</p>
                        <a href="/frontend/auth/register.html"> Registrar agora</a>

                    </form>
                </div>
            </div>

        </div>

    </main>

</body>
</html>
