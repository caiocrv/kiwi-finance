<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>KiwiFinance</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components/sidebar.css">
  <link rel="stylesheet" href="css/components/modal.css">
  <link rel="stylesheet" href="css/components/table.css">
  <link rel="shortcut icon" href="assets/images/KiwiFinance.png" type="image/x-icon">
</head>

<body>

  <div class="layout">

    <!--SIDEBAR -->
    <aside class="sidebar">

      <!-- PERFIL -->
      <div class="perfil">
        <img src="assets/images/logo.png" alt="Logo" class="logo">

        <div class="info">
          <h2 id="user-name">Nome do Usuário</h2>
          <p id="user-email">email@email.com</p>
        </div>
      </div>

      <!-- MENU -->
      <nav class="menu">
        <button onclick="navigate('dashboard')">
          <img src="/frontend/assets/icons/dashboard.svg" alt="">
          Dashboard
        </button>

        <button onclick="navigate('transacoes')">
          <img src="/frontend/assets/icons/transacoes.svg" alt="">
          Transações
        </button>

        <button onclick="navigate('config')">
          <img src="/frontend/assets/icons/configuracoes.svg" alt="">
          Configurações
        </button>
      </nav>

    </aside>

    <!--CONTEÚDO-->
    <main id="app">


      <div class="content-wrapper">

        <!-- conteúdo dinâmico entra aqui -->

      </div>

    </main>

  </div>

  <!-- MODAL -->
  <div id="modal-root"></div>

  <!-- JS -->
  <script type="module" src="js/app.js"></script>

</body>

</html>
